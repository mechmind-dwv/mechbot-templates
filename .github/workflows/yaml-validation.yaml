name: Validate YAML

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yamllint

      - name: Validate YAML files
        run: |
          echo "::group::Validating YAML files"
          find . \( -name "*.yaml" -o -name "*.yml" \) -exec sh -c 'echo "Validating $1"; python -m yamllint --no-warnings "$1"' _ {} \;
          echo "::endgroup::"
          echo "::notice::All YAML files validated"
