name: Template Validation

on: [pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install yamllint jinja2-cli

      - name: Validate YAML variables
        run: yamllint variables/

      - name: Validate Jinja2 templates
        run: |
          for file in $(find . -name "*.j2" -o -name "*.jinja" -o -name "*.jinja2"); do
            echo "Validating $file"
            jinja2-cli --format=yaml $file variables/globales.yaml > /dev/null
          done
