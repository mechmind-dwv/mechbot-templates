name: Validate Required Secrets

on: [push, pull_request]

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Required Secrets
        run: |
          if [ -z "${{ secrets.SLACK_TOKEN }}" ]; then
            echo "ERROR: SLACK_TOKEN is not configured"
            exit 1
          fi
          echo "Secrets validated successfully"
