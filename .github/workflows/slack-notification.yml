name: Slack Notification

on:
  workflow_dispatch:  # Permite ser llamado manualmente o desde otro workflow
  workflow_run:
    workflows: ["Scheduled Generation"]
    types: [completed]

jobs:
  slack-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            console.log('Slack notification workflow triggered');
