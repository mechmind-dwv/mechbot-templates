# templates/deployment/kubernetes/values.yaml
replicaCount: 3

image:
  repository: mechbot/2.0x
  tag: stable
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
